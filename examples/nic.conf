# /etc/nic.conf — nic network configuration
# Lines starting with # are comments
# See: nic show, nic dry-run

# --- Interface aliases and MAC pinning ---
# alias <name> <interface>
# pin   <name> <mac-address>
#
# alias my_eth enp14s0
# pin   my_eth aa:bb:cc:dd:ee:ff

# --- Bring up interfaces ---
# Full iproute2 syntax:
#   ip link set eth0 up
# Abbreviated:
#   ip l s eth0 up
# Shortcuts:
#   if eth0 up
#   up eth0

up eth0

# --- IP addresses ---
# Full iproute2 syntax:
#   ip address add 192.168.1.100/24 dev eth0
# Abbreviated:
#   ip a a 192.168.1.100/24 dev eth0
# Shortcut (auto-adds /32 for IPv4, /128 for IPv6 if no prefix given):
#   ip 192.168.1.100/24 eth0

#ip 192.168.1.100/24 eth0

# --- Routes ---
# Full iproute2 syntax:
#   ip route add default via 192.168.1.1 dev eth0
# Abbreviated:
#   ip r a default via 192.168.1.1 dev eth0
# Shortcut:
#   route default via 192.168.1.1 eth0

#route default via 192.168.1.1 eth0

# --- DNS ---
# nameserver <ip> or ns <ip>
#ns 2001:67c:930::1
#ns 8.8.8.8

# --- DHCP (instead of static IP) ---
# dhcp <interface> [client]
# Supported clients: dhclient, dhcpcd, udhcpc (auto-detected)
# dhcp eth0

# --- WiFi ---
# wifi <ssid> <password> [interface]
# Auto-detects wireless interface and uses best security (WPA3/WPA2)
# wifi MyNetwork MyPassword

# Include additional config files (loaded in alphanumeric / natural order)
include nic.d/*.conf
