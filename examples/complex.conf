# Complex test config with all syntax forms

# Aliases
alias my_eth enp14s0

# Full iproute2
ip link set eth0 up
ip address add 10.0.0.1/24 dev eth0

# Abbreviated iproute2
ip l s eth1 up
ip a a 10.0.1.1/24 dev eth1
ip r a 10.0.2.0/24 via 10.0.0.1 dev eth0

# Shortcuts
if eth2 up
up eth3
down eth4
ip fd76:1e4b:375a::/48 my_eth
ip 192.168.0.100/24 my_eth
ip 192.168.0.200 my_eth
route default via 192.168.0.1 my_eth
route 10.10.0.0/16 via 192.168.0.1 my_eth
route 172.16.0.0/12 eth0
route fd76:1e4b:375a::1/48 eth0

# LACP bond
ip link add bond0 type bond mode 802.3ad xmit_hash_policy layer2+3 lacp_rate fast
ip link set eth0 down
ip link set eth1 down
ip link set eth0 master bond0
ip link set eth1 master bond0
if bond0 up

# VLANs
ip link add link bond0 name bond0.100 type vlan id 100
ip 192.168.100.10/24 bond0.100
if bond0.100 up

# DNS
nameserver 185.71.138.138
ns 9.9.9.9

# WiFi (commented)
# wifi MyNetwork MyPassword
