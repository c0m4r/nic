# /etc/nic.d/vlans.conf — LACP bond with VLANs example
#
# Create a bond interface (LACP 802.3ad)
# ip link add bond0 type bond mode 802.3ad xmit_hash_policy layer2+3 lacp_rate fast
#
# Add slaves
# ip link set eth0 down
# ip link set eth1 down
# ip link set eth0 master bond0
# ip link set eth1 master bond0
#
# Bring up bond
# if bond0 up
#
# Add VLANs
# ip link add link bond0 name bond0.100 type vlan id 100
# ip link add link bond0 name bond0.200 type vlan id 200
#
# Assign IPs
# ip 192.168.100.10/24 bond0.100
# ip 192.168.200.10/24 bond0.200
#
# Bring up VLANs
# if bond0.100 up
# if bond0.200 up
#
# Default route
# route default via 192.168.100.1 bond0.100

